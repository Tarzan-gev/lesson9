<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Add User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Зеленая кнопка Add new user */
        .btn-add {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 500;
            display: block;
            margin: 0 auto;  /* Выравнивание по центру */
        }
        .btn-add:hover {
            background-color: #218838;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 class="mb-4">Admin panel</h1>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a href="/admin/users" class="nav-link">Users table</a></li>
        <li class="nav-item"><a href="#" class="nav-link active">New user</a></li>
    </ul>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Add New User</h5>
        </div>
        <div class="card-body">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/users}" th:object="${user}" method="post" class="needs-validation" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">First name</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required />
                    <div class="invalid-feedback">Please enter first name</div>
                </div>
                <div class="mb-3">
                    <label for="surname" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="surname" th:field="*{surname}" required />
                    <div class="invalid-feedback">Please enter last name</div>
                </div>
                <div class="mb-3">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control" id="age" th:field="*{age}" required />
                    <div class="invalid-feedback">Please enter age</div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required />
                    <div class="invalid-feedback">Please enter valid email</div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" required />
                    <div class="invalid-feedback">Please enter password</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="roleIds" multiple size="2" required>
                        <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                    </select>
                    <div class="invalid-feedback">Please select at least one role</div>
                </div>

                <!-- Зеленая кнопка Add new user по центру -->
                <button type="submit" class="btn-add">Add new user</button>
            </form>
        </div>
    </div>
</div>

<script>
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
