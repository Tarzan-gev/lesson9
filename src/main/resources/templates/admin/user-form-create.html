!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Add User</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h2 class="mb-0">Add New User</h2>
                </div>
                <div class="card-body">

                    <!-- Блок для отображения ошибки -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/admin/users}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Name:</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                        </div>

                        <div class="mb-3">
                            <label for="surname" class="form-label fw-bold">Surname:</label>
                            <input type="text" class="form-control" id="surname" th:field="*{surname}" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email:</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Password:</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" required>
                        </div>

                        <!-- Блок выбора ролей -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Roles:</label>
                            <div class="border p-3 rounded bg-light">
                                <div th:each="role : ${allRoles}" class="form-check">
                                    <input type="checkbox"
                                           class="form-check-input"
                                           name="roleIds"
                                           th:value="${role.id}"
                                           th:id="'role_' + ${role.id}">
                                    <label class="form-check-label" th:for="'role_' + ${role.id}"
                                           th:text="${role.name}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-success px-4">Add User</button>
                            <a href="/admin/users" class="btn btn-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (optional for some features) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
