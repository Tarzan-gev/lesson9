<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Users Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 class="mb-4">Admin panel</h1>
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a href="#" class="nav-link active">Users table</a></li>
        <li class="nav-item"><a href="/admin/users/new" class="nav-link">New user</a></li>
    </ul>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Users table</h5>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped mb-0">
                    <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.name}"></td>
                        <td th:text="${user.surname}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                                <span th:each="role : ${user.roles}"
                                      th:class="${role.name == 'ADMIN'} ? 'badge bg-warning text-dark me-1' : 'badge bg-info me-1'"
                                      th:text="${role.name}"></span>
                        </td>
                        <td>
                            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-primary btn-sm">Edit</a>
                        </td>
                        <td>
                            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
