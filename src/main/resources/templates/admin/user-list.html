<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Users Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            flex: 1;
            margin-left: 20px;
        }
        .activation-bar {
            background-color: #1a1e21;
            color: #fff;
            padding: 5px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.85rem;
        }
    </style>
</head>
<body class="bg-light">
<div class="container-fluid mt-4" style="margin-bottom: 60px;">
    <div class="d-flex">
        <!-- Левая боковая панель с Admin и User -->
        <div class="sidebar">
            <a href="#" class="active">Admin</a>
            <a href="#">User</a>
        </div>

        <!-- Основной контент -->
        <div class="main-content">
            <h1 class="mb-4">Admin panel</h1>

            <!-- Навигация Users table и New User -->
            <div class="d-flex align-items-center mb-3">
                <div class="nav-links">
                    <span class="fw-bold me-3">Users table</span>
                    <a href="/admin/users/new" class="text-decoration-none">New User</a>
                </div>
                <form th:action="@{/logout}" method="post" class="ms-auto">
                    <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
                </form>
            </div>

            <h5 class="mb-2">All users</h5>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped mb-0">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Age</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Edit</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">2</td>
                                <td th:text="${user.name}">admin</td>
                                <td th:text="${user.surname}">admin</td>
                                <td th:text="${user.age}">35</td>
                                <td th:text="${user.email}">admin@mail.ru</td>
                                <td>
                                    <span th:each="role : ${user.roles}"
                                          class="badge bg-secondary me-1"
                                          th:text="${role.name}">ADMIN</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/users/{id}/edit(id=${user.id})}"
                                       class="btn btn-outline-primary btn-sm">Edit</a>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-danger btn-sm"
                                            data-bs-toggle="modal"
                                            data-bs-target="#deleteModal"
                                            th:data-user-id="${user.id}"
                                            th:data-user-name="${user.name}"
                                            th:data-user-surname="${user.surname}"
                                            th:data-user-age="${user.age}"
                                            th:data-user-email="${user.email}"
                                            th:data-user-roles="${user.roles}">Delete</button>
                                </td>
                            </tr>
                            <tr>
                                <td>3</td>
                                <td>user</td>
                                <td>user</td>
                                <td>30</td>
                                <td>user@mail.ru</td>
                                <td>
                                    <span class="badge bg-secondary me-1">USER</span>
                                </td>
                                <td>
                                    <a href="#" class="btn btn-outline-primary btn-sm">Edit</a>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-outline-danger btn-sm">Delete</button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно для удаления -->
<div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteModalLabel">Delete user</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="fw-bold">ID</label>
                    <div id="modalUserId" class="border p-2 bg-light">2</div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">First name</label>
                    <div id="modalUserFirstName" class="border p-2 bg-light">admin</div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Last name</label>
                    <div id="modalUserLastName" class="border p-2 bg-light">admin</div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Age</label>
                    <div id="modalUserAge" class="border p-2 bg-light">35</div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Email</label>
                    <div id="modalUserEmail" class="border p-2 bg-light">admin@mail.ru</div>
                </div>
                <div class="mb-3">
                    <label class="fw-bold">Role</label>
                    <div id="modalUserRoles" class="border p-2 bg-light">ADMIN USER</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <form id="deleteForm" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>


<script>
    // Заполнение модального окна данными пользователя
    document.addEventListener('DOMContentLoaded', function() {
        var deleteModal = document.getElementById('deleteModal');
        deleteModal.addEventListener('show.bs.modal', function(event) {
            var button = event.relatedTarget;

            var userId = button.getAttribute('data-user-id');
            var userName = button.getAttribute('data-user-name');
            var userSurname = button.getAttribute('data-user-surname');
            var userAge = button.getAttribute('data-user-age');
            var userEmail = button.getAttribute('data-user-email');
            var userRoles = button.getAttribute('data-user-roles');

            document.getElementById('modalUserId').textContent = userId;
            document.getElementById('modalUserFirstName').textContent = userName;
            document.getElementById('modalUserLastName').textContent = userSurname;
            document.getElementById('modalUserAge').textContent = userAge;
            document.getElementById('modalUserEmail').textContent = userEmail;
            document.getElementById('modalUserRoles').textContent = userRoles;

            document.getElementById('deleteForm').action = '/admin/users/' + userId + '/delete';
        });
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
