<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - User List</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f5f5f5; }
        a {
            color: #2196F3;
            text-decoration: none;
            margin-right: 10px;
        }
        a:hover { text-decoration: underline; }
        button {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover { background-color: #da190b; }
        .create-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 3px;
            display: inline-block;
        }
        .create-btn:hover {
            background-color: #45a049;
            text-decoration: none;
        }
        .role-badge {
            background-color: #e3f2fd;
            color: #1976d2;
            padding: 3px 8px;
            margin: 2px;
            border-radius: 3px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        .admin-badge {
            background-color: #ffeb3b;
            color: #333;
        }
        .logout-form {
            margin-left: 20px;
            display: inline;
        }
        .logout-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 3px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background-color: #da190b;
        }
    </style>
</head>
<body>
<h1>User Management</h1>

<div style="margin-bottom: 20px;">
    <a href="/admin/users/new" class="create-btn">➕ Add New User</a>

    <form th:action="@{/logout}" method="post" class="logout-form" style="display: inline;">
        <button type="submit" class="logout-btn">🚪 Logout</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Surname</th>
        <th>Email</th>
        <th>Roles</th> <!-- Добавлена колонка для ролей -->
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.name}"></td>
        <td th:text="${user.surname}"></td>
        <td th:text="${user.email}"></td>
        <td>
            <!-- Отображение ролей пользователя -->
            <span th:each="role : ${user.roles}"
                  th:classappend="${role.name == 'ADMIN'} ? 'role-badge admin-badge' : 'role-badge'"
                  th:text="${role.name}"></span>
            <span th:if="${user.roles.isEmpty()}" style="color: #999;">No roles</span>
        </td>
        <td>
            <a th:href="@{/admin/users/{id}/edit(id=${user.id})}">✏️ Edit</a>

            <form th:action="@{/admin/users/{id}/delete(id=${user.id})}"
                  method="post"
                  style="display:inline;">
                <button type="submit"
                        onclick="return confirm('Are you sure you want to delete this user?')">🗑️ Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
