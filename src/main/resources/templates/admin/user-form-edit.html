<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        /* Серая кнопка Close */
        .btn-close-custom {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-close-custom:hover {
            background-color: #5a6268;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4">
    <h1 class="mb-4">Admin panel</h1>

    <ul class="nav nav-tabs mb-3">
        <li class="nav-item"><a href="/admin/users" class="nav-link">Users table</a></li>
        <li class="nav-item"><a href="#" class="nav-link active">Edit user</a></li>
    </ul>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Edit User</h5>
        </div>
        <div class="card-body">

            <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>
            <div th:if="${param.success}" class="alert alert-success">User updated successfully!</div>

            <form th:action="@{/admin/users/{id}/update(id=${user.id})}" th:object="${user}" method="post" class="needs-validation" novalidate>
                <input type="hidden" th:field="*{id}" />

                <div class="mb-3">
                    <label for="name" class="form-label">First name</label>
                    <input type="text" class="form-control" id="name" th:field="*{name}" required />
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small mt-1"></div>
                </div>
                <div class="mb-3">
                    <label for="surname" class="form-label">Last name</label>
                    <input type="text" class="form-control" id="surname" th:field="*{surname}" required />
                    <div th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="text-danger small mt-1"></div>
                </div>
                <div class="mb-3">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control" id="age" th:field="*{age}" required />
                    <div th:if="${#fields.hasErrors('age')}" th:errors="*{age}" class="text-danger small mt-1"></div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" th:field="*{email}" required />
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small mt-1"></div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Leave blank to keep current" />
                    <div class="form-text">Leave blank to keep current password</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Role</label>
                    <select class="form-select" name="roleIds" multiple size="2" required>
                        <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}" th:selected="${user.roles.contains(role)}"></option>
                    </select>
                    <div th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="text-danger small mt-1"></div>
                </div>

                <!-- Кнопки справа: серая Close и синяя Update -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="/admin/users" class="btn-close-custom">Close</a>
                    <button type="submit" class="btn btn-primary px-4">Update</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (() => {
        'use strict';
        const forms = document.querySelectorAll('.needs-validation');
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
