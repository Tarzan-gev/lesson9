<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin - Edit User</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Edit User</h2>
                </div>
                <div class="card-body">

                    <!-- Блок для отображения ошибок -->
                    <div th:if="${param.error}" class="alert alert-danger" th:text="${param.error}"></div>

                    <!-- Блок для отображения успеха -->
                    <div th:if="${param.success}" class="alert alert-success">
                        User updated successfully!
                    </div>

                    <form th:action="@{/admin/users/{id}/update(id=${user.id})}" th:object="${user}" method="post">
                        <!-- Скрытое поле ID -->
                        <input type="hidden" th:field="*{id}" />

                        <div class="mb-3">
                            <label for="name" class="form-label fw-bold">Name:</label>
                            <input type="text" class="form-control" id="name" th:field="*{name}" required>
                            <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="surname" class="form-label fw-bold">Surname:</label>
                            <input type="text" class="form-control" id="surname" th:field="*{surname}" required>
                            <div th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email:</label>
                            <input type="email" class="form-control" id="email" th:field="*{email}" required>
                            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small mt-1"></div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">Password:</label>
                            <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Leave blank to keep current">
                            <div class="form-text text-muted ms-1">Leave blank to keep current password</div>
                        </div>

                        <!-- Блок выбора ролей -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Roles:</label>
                            <div class="border p-3 rounded bg-light">
                                <div th:each="role : ${allRoles}" class="form-check">
                                    <input type="checkbox"
                                           class="form-check-input"
                                           name="roleIds"
                                           th:value="${role.id}"
                                           th:id="'role_' + ${role.id}"
                                           th:checked="${user.roles.contains(role)}">
                                    <label class="form-check-label" th:for="'role_' + ${role.id}" th:text="${role.name}"></label>
                                </div>
                                <div th:if="${#fields.hasErrors('roles')}" th:errors="*{roles}" class="text-danger small mt-1"></div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary px-4">Update User</button>
                            <a href="/admin/users" class="btn btn-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
