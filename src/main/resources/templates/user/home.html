
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .sidebar {
            width: 200px;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            position: fixed;
            left: 20px;
            top: 80px;
            z-index: 100;
        }
        .sidebar a {
            display: block;
            padding: 10px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #333;
            border-radius: 5px;
        }
        .sidebar a:hover {
            background-color: #e9ecef;
        }
        .sidebar a.active {
            background-color: #007bff;
            color: white;
        }
        .main-content {
            margin-left: 240px;
        }
        /* Черная плашка на всю ширину */
        .top-info-bar {
            background-color: #212529;
            color: white;
            padding: 10px 20px;
            margin-bottom: 20px;
            margin-left: -240px;
            margin-right: -20px;
            width: calc(100% + 240px + 20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            left: 0;
            box-sizing: border-box;
            top: 0;
        }
        .container {
            width: 100%;
            padding-right: 20px;
            padding-left: 20px;
            margin-right: auto;
            margin-left: auto;
            box-sizing: border-box;
        }
        .btn-outline-light {
            color: white;
            border-color: white;
        }
        .btn-outline-light:hover {
            background-color: white;
            color: #212529;
        }
        .activation-bar {
            background-color: #1a1e21;
            color: #fff;
            padding: 5px 0;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            font-size: 0.85rem;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-light">
<!-- Левая боковая панель - показываем разные кнопки в зависимости от роли -->
<div class="sidebar" sec:authorize="!hasRole('ADMIN')">
    <a href="/user" class="active">User</a>
</div>

<div class="sidebar" sec:authorize="hasRole('ADMIN')">
    <a href="/admin/users">Admin</a>
    <a href="/user" class="active">User</a>
</div>

<!-- Основной контент -->
<div class="main-content">
    <!-- Черная плашка на всю ширину с динамическими ролями -->
    <div class="top-info-bar">
        <span>
            <strong sec:authentication="name">admin@example.com</strong>
            with roles :
            <th:block th:each="role, iterStat : ${#authentication.getAuthorities()}">
                <th:block th:if="${#strings.startsWith(role.getAuthority(), 'ROLE_')}">
                    <span th:text="${#strings.replace(role.getAuthority(), 'ROLE_', '')}"></span>
                    <th:block th:if="${!iterStat.last}"> </th:block>
                </th:block>
            </th:block>
        </span>
        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </div>

    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">User information-page</h4>
            </div>
            <div class="card-body">
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td th:text="${user.id}">2</td>
                        <td th:text="${user.name}">Admin</td>
                        <td th:text="${user.surname}">Admin</td>
                        <td th:text="${user.age}">30</td>
                        <td th:text="${user.email}">admin@example.com</td>
                        <td>
                            <span th:each="role, iterStat : ${user.roles}"
                                  class="role-text"
                                  th:text="${role.name} + (${!iterStat.last} ? ' ' : '')">ADMIN</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
