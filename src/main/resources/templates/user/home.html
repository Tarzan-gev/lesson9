<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                    <h2 class="mb-0">Welcome, <span th:text="${user.name}"></span>!</h2>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </form>
                </div>
                <div class="card-body">
                    <div class="card bg-light mb-3">
                        <div class="card-body">
                            <h5 class="card-title border-bottom pb-2">Your Information</h5>

                            <div class="row mb-2">
                                <div class="col-sm-3 fw-bold">ID:</div>
                                <div class="col-sm-9" th:text="${user.id}"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-sm-3 fw-bold">Name:</div>
                                <div class="col-sm-9" th:text="${user.name}"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-sm-3 fw-bold">Surname:</div>
                                <div class="col-sm-9" th:text="${user.surname}"></div>
                            </div>
                            <div class="row mb-2">
                                <div class="col-sm-3 fw-bold">Email:</div>
                                <div class="col-sm-9" th:text="${user.email}"></div>
                            </div>
                            <div class="row">
                                <div class="col-sm-3 fw-bold">Roles:</div>
                                <div class="col-sm-9">
                                        <span th:each="role : ${user.roles}"
                                              th:class="${role.name == 'ADMIN'} ? 'badge bg-warning text-dark me-1' : 'badge bg-info me-1'"
                                              th:text="${role.name}"></span>
                                    <span th:if="${user.roles.isEmpty()}" class="badge bg-secondary">No roles assigned</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
